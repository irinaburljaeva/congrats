<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разыскиваются — 23 февраля</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  background:#2b241c;
  font-family:Montserrat, sans-serif;
  color:#f1e3c6;
  text-align:center;
}

/* Заголовок */
h1{
  font-family:"Playfair Display", serif;
  margin:40px 10px 20px;
  font-size:32px;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  padding:40px 20px;
}

.poster{
  width:220px;
  background:transparent;
  border:none;
  padding:0;
  cursor:pointer;
  transition:.2s;
  position:relative;  
}



/* Лёгкий hover */
.poster:hover{
  transform:translateY(-4px) scale(1.02);
}

.poster img{
  width:100%;
  height:auto;
  display:block;

  filter:
    sepia(60%)
    contrast(110%)
    drop-shadow(0 20px 25px rgba(0,0,0,.6))
    drop-shadow(0 40px 60px rgba(0,0,0,.4));
}

/* Имя */
.name{
  margin-top:14px;
  font-size:20px;
  font-weight:600;
  color:#f1e3c6;
  letter-spacing:1px;
}

.hero{
  max-width:700px;
  margin:0 auto 40px;
  padding:0 20px;
}

.hero h1{
  margin-bottom:18px;
}

  .pdf-frame{
  margin-top:14px;
  border:2px solid #b89a6c;
  border-radius:4px;
  overflow:hidden;
  background:#fff;
}

.pdf-frame iframe{
  width:100%;
  height:65vh;        /* растягивается по экрану */
  min-height:420px;
  border:none;
}

.hint{
  font-family:Montserrat, sans-serif;
  color:#cdbb96;

  font-size:14px;
  line-height:1.45;

  max-width:480px;
  margin:10px auto 28px;

  opacity:.85;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);

  overflow-y:auto;          /* прокрутка всей модалки */
  -webkit-overflow-scrolling:touch;

  padding:20px 12px 40px;   /* отступы как у fullscreen */
  z-index:1000;
}

.card{
  background:#f4e6c8;
  padding:22px 18px 26px;
  border-radius:8px;

  max-width:520px;
  width:100%;
  margin:0 auto;           /* центр по горизонтали */

  box-shadow:0 10px 30px rgba(0,0,0,.5);
  color:#2b1e12;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-bottom:2px solid #b89a6c;
  background:transparent;
  text-align:center;
  font-size:16px;
}

button{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  background:#b89a6c;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.gift{
  margin-top:12px;
  padding:10px;
  border-left:3px solid #b89a6c;
  background:#efe0bf;
}

.close{
  position:fixed;
  top:14px;
  right:18px;
  color:white;
  font-size:26px;
  cursor:pointer;
  z-index:2000;
}
.stamp{
  position:absolute;
  top:18px;
  right:20px;

  font-family:monospace;
  font-weight:700;
  letter-spacing:2px;
  font-size:22px;

  color:#7a0000;
  border:3px solid #7a0000;
  padding:6px 12px;

  transform:rotate(-12deg) scale(0.6);
  opacity:0;

  pointer-events:none;
}

/* анимация штампа */
.stamp.show{
  animation:stampIn .45s ease forwards;
}

@keyframes stampIn{
  0%{
    transform:rotate(-12deg) scale(2);
    opacity:0;
  }
  60%{
    transform:rotate(-12deg) scale(0.9);
    opacity:1;
  }
  100%{
    transform:rotate(-12deg) scale(1);
    opacity:1;
  }
}
/* SCANNER */
.scanner{
  font-family:monospace;
  font-size:14px;
  text-align:center;
  margin:8px 0 12px;
  letter-spacing:2px;
  color:#7a5c2e;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.3}
}

/* PIN INPUT */
.pin{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0;
}

.digit{
  width:45px;
  height:55px;
  text-align:center;
  font-size:22px;
  border:2px solid #b89a6c;
  background:#efe0bf;
  font-family:monospace;
}

.digit:focus{
  outline:none;
  border-color:#8b6a3f;
  box-shadow:0 0 8px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<h1>В этот 23 февраля разыскиваются</h1>
<div class="hint">
Если дело заведено на вас — немедленно откройте его, нажав на свой постер.
</div>
<div class="grid">

<div class="poster" onclick="openCase('4821')">
  <img src="IMG_4993.png">
  <div class="name">Дима</div>
</div>

<div class="poster" onclick="openCase('7593')">
  <img src="IMG_4984.png">
  <div class="name">Ярослав</div>
</div>

<div class="poster" onclick="openCase('1938')">
  <img src="IMG_4994.png">
  <div class="name">Егор</div>
</div>

<div class="poster" onclick="openCase('4488')">
  <img src="IMG_4983.png">
  <div class="name">Женя</div>
</div>

<div class="poster" onclick="openCase('3344')">
  <img src="IMG_4982.png">
  <div class="name">Дима</div>
</div>

<div class="poster" onclick="openCase('9087')">
  <img src="IMG_4981.png">
  <div class="name">Никита</div>
</div>

<div class="poster" onclick="openCase('6651')">
  <img src="IMG_4980.png">
  <div class="name">Тамерлан</div>
</div>

</div>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">×</div>
<div class="card" id="content"></div>
</div>

<script>
const people={

"4821":{
name:"Дима",
wanted:[
"лидерство и ответственность",
"спокойствие в любых ситуациях",
"стратегическое мышление",
"умение доводить идеи до результата"
],
text:`Дима, с 23 февраля! 😎🔥

Мы весь год шутили, что «нам всем срочно нужен санаторий»…
Но решили — начинать надо с руководства 😄

Так что этот сертификат — официальное разрешение:
✔ выдохнуть
✔ полежать
✔ ничего не решать хотя бы пару часов
✔ и вернуться к нам ещё более опасно эффективным

Пусть сил хватает на амбиции, нервов на нас, а энергии на все твои нестандартные идеи (которые мы потом героически реализуем 😅).`,
gift:{
text:"🎁 Подарочный сертификат",
file:"10585.pdf"
}
},

"7593":{
name:"Ярослав",
wanted:[
"организованность и порядок",
"точность и внимание к деталям",
"спокойствие и уверенность",
"надёжность в работе"
],
text:`Ярослав, с 23 февраля!

Ты хотел одну вещь — и вселенная услышала.

Дарим тебе сертификат в онлайн-магазин, чтобы ни одна мечта больше не «зависала на складе» 😉

Ты у нас человек «по полочкам», по таймингу и без лишнего шума, что даже подарки тебе должны быть оформлены правильно и по делу.

Пусть всё складывается чётко, красиво и с бонусами! 💙`,
gift:{
text:"🎁 Подарочный сертификат",
file:"podarok-yaroslav.pdf"
}
},

"1938":{
name:"Егор",
wanted:["стабильность","системность","надёжность"],
text:"С 23 февраля! Спасибо за порядок и уверенность, которые ты создаёшь."
},

"4488":{
name:"Женя",
wanted:["поддержку","ответственность","надёжность"],
text:"С 23 февраля! Спасибо за твою поддержку и уверенность."
},

"9087":{
name:"Никита",
wanted:["харизму","энергию","атмосферу в команде"],
text:"С 23 февраля! Спасибо за энергию и характер."
},

"6651":{
name:"Тамерлан",
wanted:["силу характера","уверенность","решительность"],
text:"С 23 февраля! Пусть всё получается легко и уверенно."
},

"3344":{
name:"Дима",
wanted:["ответственность","настойчивость","доведение до результата"],
text:"С 23 февраля! Спасибо за надёжность и результат."
}
};

let currentCode=null;

function openCase(code){
  currentCode=code;
  document.getElementById("modal").style.display="flex";
  document.getElementById("content").innerHTML=`
    <h2 style="text-align:center">Введите секретный код</h2>
    <div class="scanner">ПОДТВЕРЖДАЕМ ЛИЧНОСТЬ...</div>
    <div class="pin">
      <input maxlength="1" class="digit">
      <input maxlength="1" class="digit">
      <input maxlength="1" class="digit">
      <input maxlength="1" class="digit">
    </div>
    <button onclick="unlock()">Открыть дело</button>
  `;

  const inputs=document.querySelectorAll(".digit");
  inputs[0].focus();

  inputs.forEach((input,i)=>{
    input.addEventListener("input",()=>{
      if(input.value && inputs[i+1]) inputs[i+1].focus();
    });
  });
}

function unlock(){
  const digits=document.querySelectorAll(".digit");
  let val="";
  digits.forEach(d=>val+=d.value);

  if(val!==currentCode){
    document.querySelector(".scanner").innerText="КОД НЕ ПРИНЯТ";
    return;
  }

  document.querySelector(".scanner").innerText="ДОСТУП РАЗРЕШЁН";

  setTimeout(()=>{
    const p=people[currentCode];
    if(!p) return;

 document.getElementById("content").innerHTML=`
  <div class="stamp">ACCESS GRANTED</div>

  <h2>${p.name}</h2>

  <div style="margin:10px 0 14px;font-weight:600;">Разыскивается за:</div>

  <ul style="margin:0 0 16px 18px;">
    ${p.wanted ? p.wanted.map(w=>`<li>${w}</li>`).join("") : ""}
  </ul>

  <p style="white-space:pre-line;">${p.text}</p>

  ${p.gift?`
  <div class="gift">
    ${p.gift.text}
    <div class="pdf-frame">
      <iframe src="${p.gift.file}"></iframe>
    </div>
  </div>
  `:""}
`;
  },700);
}

  setTimeout(()=>{
  const stamp=document.querySelector(".stamp");
  if(stamp) stamp.classList.add("show");
},50);
  
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("content").innerHTML="";
}
</script>
</body>
</html>
