<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разыскиваются — 23 февраля</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#2b241c;
  font-family:Montserrat, sans-serif;
  color:#2b1e12;
  text-align:center;
}

/* Заголовок */
h1{
  font-family:"Playfair Display", serif;
  margin:40px 10px 5px;
  color:#f1e3c6;
  font-size:32px;
}
.subtitle{
  color:#d6c5a3;
  margin-bottom:25px;
}

/* Постеры */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:20px;
}

.poster{
  width:180px;
  background:#f4e6c8;
  border:3px solid #d2b48c;
  padding:10px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,.4);
  transition:.2s;
}
.poster:hover{ transform:scale(1.05); }

.poster img{
  width:100%;
  height:180px;
  object-fit:cover;
  filter:sepia(60%) contrast(110%);
}

.wanted{
  font-family:"Playfair Display", serif;
  font-weight:800;
  font-size:22px;
  margin:6px 0;
}

.name{
  font-weight:600;
  margin-bottom:4px;
}

/* Модалка */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  background:#f4e6c8;
  padding:25px;
  border-radius:6px;
  max-width:420px;
  width:100%;
  text-align:left;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-bottom:2px solid #b89a6c;
  background:transparent;
  text-align:center;
  font-size:16px;
}

button{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  background:#b89a6c;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.gift{
  margin-top:12px;
  padding:10px;
  border-left:3px solid #b89a6c;
  background:#efe0bf;
}

.close{
  position:absolute;
  top:15px;
  right:20px;
  color:white;
  font-size:22px;
  cursor:pointer;
}
/* SCANNER */
.scanner{
  font-family:monospace;
  font-size:14px;
  text-align:center;
  margin:8px 0 12px;
  letter-spacing:2px;
  color:#7a5c2e;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.3}
}

/* PIN INPUT */
.pin{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0;
}

.digit{
  width:45px;
  height:55px;
  text-align:center;
  font-size:22px;
  border:2px solid #b89a6c;
  background:#efe0bf;
  font-family:monospace;
}

.digit:focus{
  outline:none;
  border-color:#8b6a3f;
  box-shadow:0 0 8px rgba(0,0,0,.3);
}
  
</style>
</head>

<body>

<h1>В этот 23 февраля разыскиваются</h1>
<div class="subtitle"></div>

<div class="grid">

<div class="poster" onclick="openCase('4821')">
  <div class="wanted">WANTED</div>
  <img src="dima.jpg">
  <div class="name">Дима</div>
</div>

<div class="poster" onclick="openCase('7593')">
  <div class="wanted">WANTED</div>
  <img src="IMG_4984.png">
  <div class="name">Ярослав</div>
</div>

<div class="poster" onclick="openCase('1938')">
  <div class="wanted">WANTED</div>
  <img src="egor.jpg">
  <div class="name">Егор</div>
</div>

<div class="poster" onclick="openCase('4488')">
  <div class="wanted">WANTED</div>
  <img src="IMG_4983.png">
  <div class="name">Женя</div>
</div>

<div class="poster" onclick="openCase('3344')">
  <div class="wanted">WANTED</div>
  <img src="IMG_4982.png">
  <div class="name">Дима</div>
</div>

<div class="poster" onclick="openCase('9087')">
  <div class="wanted">WANTED</div>
  <img src="IMG_4981.png">
  <div class="name">Никита</div>
</div>

<div class="poster" onclick="openCase('6651')">
  <div class="wanted">WANTED</div>
  <img src="IMG_4980.png">
  <div class="name">Тамерлан</div>
</div>

</div>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">×</div>
<div class="card" id="content"></div>
</div>

<script>

const people={
"4821":{
name:"Дима",
text:"Разыскивается за надёжность, спокойствие и силу характера. Команда ценит тебя и разыскивает для торжественного поздравления.",
gift:"🎁 Разыскивается для вручения подарочного сертификата"
},
"7593":{
name:"Ярослав",
text:"Разыскивается за энергию, драйв и позитив, который двигает команду вперёд.",
gift:"🎁 Разыскивается для вручения подарка"
},
"1938":{
name:"Егор",
text:"Разыскивается за системность и стабильность, на которых держится порядок.",
gift:""
},
"4488":{
name:"Женя",
text:"Разыскивается за надёжность и готовность всегда поддержать.",
gift:""
},
"9087":{
name:"Никита",
text:"Разыскивается за харизму и атмосферу, которую ты создаёшь.",
gift:""
},
"6651":{
name:"Тамерлан",
text:"Разыскивается за силу характера и уверенность.",
gift:""
},
  "3344":{
name:"Дима",
text:"Разыскивается за .",
gift:""
}
};

let currentCode=null;

function openCase(code){
  currentCode=code;
  document.getElementById("modal").style.display="flex";
  document.getElementById("content").innerHTML=`

    <h2 style="text-align:center">ВВЕДИТЕ СЕКРЕТНЫЙ КОД РАЗЫСКИВАЕМОГО</h2>
    <div class="scanner">ПОДТВЕРЖДАЕМ ЛИЧНОСТЬ...</div>

    <div class="pin">
      <input maxlength="1" class="digit">
      <input maxlength="1" class="digit">
      <input maxlength="1" class="digit">
      <input maxlength="1" class="digit">
    </div>

    <button onclick="unlock()">Открыть дело</button>
  `;

  const inputs=document.querySelectorAll(".digit");
  inputs[0].focus();

  inputs.forEach((input,i)=>{
    input.addEventListener("input",()=>{
      if(input.value && inputs[i+1]) inputs[i+1].focus();
    });
  });
}

function unlock(){
  const digits=document.querySelectorAll(".digit");
  let val="";
  digits.forEach(d=>val+=d.value);

  if(val!==currentCode){
    document.querySelector(".scanner").innerText="ACCESS DENIED";
    return;
  }

  document.querySelector(".scanner").innerText="ACCESS GRANTED";

  setTimeout(()=>{
    const p=people[currentCode];
    document.getElementById("content").innerHTML=`
      <h2>${p.name}</h2>
      <p>${p.text}</p>
      ${p.gift?`<div class="gift">${p.gift}</div>`:""}
    `;
  },700);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
