<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 23 февраля</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.box {
    background: #121212;
    padding: 40px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 15px;
    font-size: 16px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: gold;
    font-weight: 600;
    cursor: pointer;
}

.hidden { display: none; }

.certificate {
    margin-top: 20px;
    padding: 15px;
    background: #1f1f1f;
    border-left: 4px solid gold;
    border-radius: 8px;
}
</style>
</head>
<body>

<div class="box" id="loginBox">
<h2>Введите персональный код</h2>
<input id="codeInput" placeholder="Код доступа">
<button onclick="login()">Войти</button>
</div>

<div class="box hidden" id="contentBox">
<h2 id="name"></h2>
<p id="text"></p>
<div id="certificate"></div>
</div>

<script>

const users = {
  "4821": {
    name: "Дима",
    text: "Дима, с 23 февраля! Спасибо за надёжность, спокойствие и силу. Ты настоящая опора команды.",
    certificate: "🎁 Сертификат: 5 000 ₽"
  },
  "7593": {
    name: "Ярослав",
    text: "Ярослав, твоя энергия заряжает всех вокруг. Спасибо за драйв и позитив!",
    certificate: ""
  },
  "1938": {
    name: "Егор",
    text: "Егор, твоя системность — фундамент нашей команды. С праздником!",
    certificate: '<img src="egor.jpg" width="100%">'
  },
  "4488": {
    name: "Женя",
    text: "Женя, на тебя всегда можно положиться. Спасибо за твою стабильность.",
    certificate: ""
  },
  "3344": {
    name: "Дима",
    text: "Дима, твоя ответственность — пример для всех. С праздником!",
    certificate: ""
  },
  "9087": {
    name: "Никита",
    text: "Никита, твоя харизма и энергия делают команду сильнее!",
    certificate: "🎁 Сертификат: Спортмастер 4 000 ₽"
  },
  "6651": {
    name: "Тамерлан",
    text: "Тамерлан, твоя решительность и характер вдохновляют. С 23 февраля!",
    certificate: ""
  }
};

function login() {
  const code = document.getElementById("codeInput").value.trim();

  if (!users[code]) {
    alert("Неверный код");
    return;
  }

  const user = users[code];

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("contentBox").classList.remove("hidden");

  document.getElementById("name").innerText = user.name;
  document.getElementById("text").innerText = user.text;
  document.getElementById("certificate").innerHTML = user.certificate;
}

</script>

</body>
</html>
