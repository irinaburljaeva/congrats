<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разыскиваются — 23 февраля</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  background:#2b241c;
  font-family:Montserrat, sans-serif;
  color:#f1e3c6;
  text-align:center;
}

h1{
  font-family:"Playfair Display", serif;
  margin:40px 10px 20px;
  font-size:32px;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  padding:40px 20px;
}

.poster{
  width:220px;
  cursor:pointer;
  transition:.2s;
}

.poster:hover{ transform:translateY(-4px) scale(1.02); }

.poster img{
  width:100%;
  display:block;
  filter:
    sepia(60%)
    contrast(110%)
    drop-shadow(0 20px 25px rgba(0,0,0,.6))
    drop-shadow(0 40px 60px rgba(0,0,0,.4));
}

.name{
  margin-top:14px;
  font-size:20px;
  font-weight:600;
}

/* ===== BLOCKS ===== */

.wanted-block{
  background:#efe0bf;
  border-left:4px solid #b89a6c;
  padding:14px;
  border-radius:4px;
  margin:14px 0 18px;
  color:#2b1e12;
  text-align:left;
}

.congrats{
  margin:16px 0;
  line-height:1.6;
  color:#2b1e12;
  text-align:left;
}

.gift{
  margin-top:16px;
  padding:12px;
  border-left:3px solid #b89a6c;
  background:#efe0bf;
  border-radius:4px;
  color:#2b1e12;
}

.pdf-preview{
  margin-top:10px;
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.pdf-preview iframe{
  width:100%;
  height:240px;
  border:none;
  pointer-events:none;
}

/* FULLSCREEN PDF */

.pdf-full{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3000;
}

.pdf-full iframe{
  width:96%;
  height:96%;
  border:none;
  background:#fff;
}

.pdf-close{
  position:absolute;
  top:18px;
  right:24px;
  color:white;
  font-size:28px;
  cursor:pointer;
}

/* MODAL */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  overflow-y:auto;
  padding:20px 12px 40px;
  z-index:1000;
  justify-content:center;  
  align-items:flex-start;
}

.card{
  background:#f4e6c8;
  padding:22px 18px 26px;
  border-radius:8px;
  max-width:520px;
  width:100%;
  margin:0 auto;
  color:#2b1e12;
  position:relative;
}

.close{
  position:fixed;
  top:14px;
  right:18px;
  color:white;
  font-size:26px;
  cursor:pointer;
}

/* STAMP */

.stamp{
  position:absolute;
  top:18px;
  right:20px;
  font-family:monospace;
  font-weight:700;
  letter-spacing:2px;
  font-size:22px;
  color:#7a0000;
  border:3px solid #7a0000;
  padding:6px 12px;
  transform:rotate(-12deg) scale(0.6);
  opacity:0;
}

.stamp.show{
  animation:stampIn .45s ease forwards;
}

@keyframes stampIn{
  0%{ transform:rotate(-12deg) scale(2); opacity:0; }
  60%{ transform:rotate(-12deg) scale(0.9); opacity:1; }
  100%{ transform:rotate(-12deg) scale(1); opacity:1; }
}

.pin{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0;
}

.digit{
  width:45px;
  height:55px;
  font-size:22px;
  text-align:center;
  border:2px solid #b89a6c;
  background:#efe0bf;
}

  /* ===================== */
/* WOW PIN SCREEN        */
/* ===================== */

.access-screen{
  text-align:center;
  animation:fadeIn .35s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(8px)}
  to{opacity:1; transform:none}
}

.access-title{
  font-family:"Playfair Display", serif;
  font-size:26px;
  margin-bottom:18px;
  letter-spacing:.5px;
}

.pin{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:18px 0 14px;
}

.digit{
  width:54px;
  height:64px;
  font-size:26px;
  text-align:center;
  border:2px solid #b89a6c;
  background:#f1e3c6;
  border-radius:6px;
  transition:.18s;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.digit:focus{
  outline:none;
  border-color:#8b6a3f;
  box-shadow:
    0 0 0 2px rgba(184,154,108,.3),
    0 0 12px rgba(184,154,108,.35);
  transform:translateY(-1px);
}

/* shake если код неверный */
.shake{
  animation:shake .35s;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
}

.open-btn{
  margin-top:8px;
  padding:10px 22px;
  border:none;
  border-radius:20px;
  background:linear-gradient(180deg,#c9b18a,#a88a5c);
  color:#fff;
  font-weight:600;
  letter-spacing:.3px;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,.25);
  transition:.18s;
}

.open-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(0,0,0,.3);
}

.access-hint{
  margin-top:10px;
  font-size:13px;
  opacity:.65;
  letter-spacing:.5px;
}
</style>
</head>

<body>

<h1>В этот 23 февраля разыскиваются</h1>
<div class="hint">
Если дело заведено на вас — немедленно откройте его, нажав на свой постер.
</div>
<div class="grid">
<div class="poster" onclick="openCase('4821')"><img src="IMG_4993.png"><div class="name">Дима</div></div>
<div class="poster" onclick="openCase('7593')"><img src="IMG_4984.png"><div class="name">Ярослав</div></div>
<div class="poster" onclick="openCase('1938')"><img src="IMG_4994.png"><div class="name">Егор</div></div>
<div class="poster" onclick="openCase('4488')"><img src="IMG_4983.png"><div class="name">Женя</div></div>
<div class="poster" onclick="openCase('3344')"><img src="IMG_4982.png"><div class="name">Дима</div></div>
<div class="poster" onclick="openCase('9087')"><img src="IMG_4981.png"><div class="name">Никита</div></div>
<div class="poster" onclick="openCase('6651')"><img src="IMG_4980.png"><div class="name">Тамерлан</div></div>
</div>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">×</div>
<div class="card" id="content"></div>
</div>

<div class="pdf-full" id="pdfFull">
<div class="pdf-close" onclick="closePDF()">✕</div>
<iframe id="pdfFrame"></iframe>
</div>

<script>

const people={
"4821":{
name:"Дима",
wanted:["лидерство и ответственность","спокойствие в любых ситуациях","стратегическое мышление","умение доводить идеи до результата"],
text:`Дима, с 23 февраля! 😎🔥

Мы весь год шутили, что «нам всем срочно нужен санаторий»…
Но решили — начинать надо с руководства 😄

Так что этот сертификат — официальное разрешение:
✔ выдохнуть
✔ полежать
✔ ничего не решать хотя бы пару часов
✔ и вернуться к нам ещё более опасно эффективным

Пусть сил хватает на амбиции, нервов на нас, а энергии на все твои нестандартные идеи (которые мы потом героически реализуем 😅).`,
gift:{text:"🎁 Подарочный сертификат",file:"10585.pdf"}
},

"7593":{
name:"Ярослав",
wanted:["организованность и порядок","точность и внимание к деталям","спокойствие и уверенность","надёжность в работе"],
text:`Ярослав, с 23 февраля!

Ты хотел одну вещь — и вселенная услышала.

Дарим тебе сертификат в онлайн-магазин, чтобы ни одна мечта больше не «зависала на складе» 😉

Ты у нас человек «по полочкам», по таймингу и без лишнего шума, что даже подарки тебе должны быть оформлены правильно и по делу.

Пусть всё складывается чётко, красиво и с бонусами! 💙`,
gift:{text:"🎁 Подарочный сертификат",file:"podarok-yaroslav.pdf"}
},

"1938":{name:"Егор",wanted:["стабильность","системность","аналитическое мышление"],text:"С 23 февраля! Спасибо за порядок и уверенность."},
"4488":{name:"Женя",wanted:["креативность","ответственность","надёжность"],text:"С 23 февраля! Спасибо за твою поддержку."},
"9087":{name:"Никита",wanted:["новые подходы","энергию","решительность"],text:"С 23 февраля! Спасибо за энергию и характер."},
"6651":{name:"Тамерлан",wanted:["креативность","уверенность","оперативность"],text:"С 23 февраля! Пусть всё получается легко."},
"3344":{name:"Дима",wanted:["ответственность","оперативность","доведение до результата"],text:"С 23 февраля! Спасибо за надёжность."}
};

let currentCode=null;

function openCase(code){
  currentCode=code;
  document.getElementById("modal").style.display="flex";

  document.getElementById("content").innerHTML=`
    <div class="access-screen">

      <div class="access-title">Секретный доступ</div>

      <div class="pin" id="pinBox">
        <input maxlength="1" class="digit">
        <input maxlength="1" class="digit">
        <input maxlength="1" class="digit">
        <input maxlength="1" class="digit">
      </div>

      <button class="open-btn" onclick="unlock()">Открыть дело</button>

      <div class="access-hint">Введите персональный код доступа</div>
    </div>
  `;

  const inputs=document.querySelectorAll(".digit");
  inputs[0].focus();

  inputs.forEach((input,i)=>{
    input.addEventListener("input",()=>{
      if(input.value && inputs[i+1]) inputs[i+1].focus();
    });

    input.addEventListener("keydown",(e)=>{
      if(e.key==="Backspace" && !input.value && inputs[i-1])
        inputs[i-1].focus();
    });
  });
}


function unlock(){
  const val=[...document.querySelectorAll(".digit")].map(d=>d.value).join("");
  if(val!==currentCode){
  const box=document.getElementById("pinBox");
  box.classList.add("shake");
  setTimeout(()=>box.classList.remove("shake"),350);
  return;
}

  const p=people[currentCode];

  document.getElementById("content").innerHTML=`
    <div class="stamp">ACCESS GRANTED</div>

    <h2>${p.name}</h2>

    <div class="wanted-block">
      <b>Разыскивается за:</b>
      <ul>${p.wanted.map(w=>`<li>${w}</li>`).join("")}</ul>
    </div>

    <div class="congrats">
      <p style="white-space:pre-line;">${p.text}</p>
    </div>

    ${p.gift?`
    <div class="gift">
      ${p.gift.text}
      <div class="pdf-preview" onclick="openPDF('${p.gift.file}')">
        <iframe src="${p.gift.file}"></iframe>
      </div>
    </div>`:""}
  `;

  setTimeout(()=>document.querySelector(".stamp").classList.add("show"),50);
}

function openPDF(file){
  document.getElementById("pdfFrame").src=file;
  document.getElementById("pdfFull").style.display="flex";
}

function closePDF(){
  document.getElementById("pdfFull").style.display="none";
  document.getElementById("pdfFrame").src="";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
